<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting OSIS v5 - Pro Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617;
            color: #f1f5f9;
        }

        .no-chrome-warning { -webkit-text-security: disc; }

        .glass {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .grad-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .animate-sidebar { animation: slideIn 0.3s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-view { animation: fadeIn 0.4s ease-out forwards; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, deleteDoc, increment, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyDFD_ZOL4RAyaadaGdk5PJb8BIwG6GInOE",
            authDomain: "testsaja-39ab7.firebaseapp.com",
            projectId: "testsaja-39ab7",
            storageBucket: "testsaja-39ab7.firebasestorage.app",
            messagingSenderId: "503650943182",
            appId: "1:503650943182:web:eec5678291f3bf2774509f",
            measurementId: "G-VSQ3SHGHQL"
        };

        let db, auth, appId;
        let currentUser = null;
        let currentRole = localStorage.getItem('user_role') || null; 
        let currentView = localStorage.getItem('current_view') || 'selection';
        let adminTab = localStorage.getItem('admin_tab') || 'dashboard'; 
        let candidates = [];
        let voters = [];
        let isConnected = false;
        let showSidebar = false;
        let discordWebhook = localStorage.getItem('discord_webhook') || '';

        let modalConfig = { show: false, title: '', message: '', onConfirm: null };

        async function startApp() {
            try {
                appId = typeof __app_id !== 'undefined' ? __app_id : 'osis-evoting-v5-webhook';
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // Perbaikan Autentikasi: Mengatasi custom-token-mismatch
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else { 
                            await signInAnonymously(auth); 
                        }
                    } catch (authError) {
                        console.warn("Gagal menggunakan custom token, mencoba masuk secara anonim...", authError);
                        await signInAnonymously(auth);
                    }
                };
                
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        startDataListeners();
                        if (currentRole === 'voter') {
                            const saved = localStorage.getItem('user_data');
                            if (saved) currentUser = JSON.parse(saved);
                        }
                    }
                    window.render();
                });
            } catch (err) { 
                console.error("Gagal memulai aplikasi:", err); 
            }
        }

        function startDataListeners() {
            const basePath = ['artifacts', appId, 'public', 'data'];
            
            // Listener Kandidat
            onSnapshot(collection(db, ...basePath, 'candidates'), (snap) => {
                candidates = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                isConnected = true;
                window.render();
            }, (error) => { 
                console.error("Firestore error (candidates):", error);
                isConnected = false; 
                window.render(); 
            });

            // Listener Pemilih
            onSnapshot(collection(db, ...basePath, 'voters'), (snap) => {
                voters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (currentRole === 'voter' && currentUser) {
                    const freshData = voters.find(v => v.nisn === currentUser.nisn);
                    if (freshData) {
                        currentUser = freshData;
                        localStorage.setItem('user_data', JSON.stringify(freshData));
                    }
                }
                window.render();
            }, (error) => {
                console.error("Firestore error (voters):", error);
            });

            // Listener Pengaturan Discord
            onSnapshot(doc(db, ...basePath, 'settings', 'discord'), (docSnap) => {
                if (docSnap.exists()) {
                    discordWebhook = docSnap.data().url;
                    localStorage.setItem('discord_webhook', discordWebhook);
                    window.render();
                }
            }, (error) => {
                console.error("Firestore error (settings):", error);
            });
        }

        async function sendDiscordNotify(voterName, voterClass, candidateName) {
            if (!discordWebhook) return;
            try {
                await fetch(discordWebhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "📩 Suara Baru Masuk!",
                            color: 5814783,
                            fields: [
                                { name: "Nama Pemilih", value: voterName, inline: true },
                                { name: "Kelas", value: voterClass, inline: true },
                                { name: "Memilih Kandidat", value: candidateName, inline: false }
                            ],
                            footer: { text: "E-Voting OSIS Pro v5" },
                            timestamp: new Date().toISOString()
                        }]
                    })
                });
            } catch (e) { console.error("Gagal mengirim notifikasi Discord:", e); }
        }

        window.toggleSidebar = () => { showSidebar = !showSidebar; window.render(); };
        window.setAdminTab = (tab) => { 
            adminTab = tab; 
            localStorage.setItem('admin_tab', tab);
            showSidebar = false; 
            window.render(); 
        };

        window.saveWebhook = async () => {
            const url = document.getElementById('webhook-input').value.trim();
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'discord'), { url });
                window.showModal("Berhasil", "URL Webhook Discord telah disimpan.");
            } catch (e) { 
                console.error(e);
                window.showModal("Gagal", "Tidak dapat menyimpan pengaturan.");
            }
        };

        window.showModal = (title, message, onConfirm = null) => {
            modalConfig = { show: true, title, message, onConfirm };
            window.render();
        };

        window.closeModal = () => {
            modalConfig.show = false;
            window.render();
        };

        window.handleLogin = async (type) => {
            const userInp = document.getElementById('login-user').value.trim();
            const passInp = document.getElementById('login-pass').value.trim();
            const errorEl = document.getElementById('login-error');

            if (type === 'admin') {
                if (userInp === 'admin' && passInp === 'adminosis2024') {
                    currentRole = 'admin'; 
                    currentView = 'admin-panel';
                    localStorage.setItem('user_role', 'admin');
                    localStorage.setItem('current_view', 'admin-panel');
                } else { errorEl.innerText = "Akses ditolak!"; return; }
            } else {
                const found = voters.find(v => v.nisn === userInp && v.password === passInp);
                if (found) {
                    currentRole = 'voter'; 
                    currentUser = { ...found }; 
                    currentView = 'voter-panel';
                    localStorage.setItem('user_role', 'voter');
                    localStorage.setItem('current_view', 'voter-panel');
                    localStorage.setItem('user_data', JSON.stringify(found));
                } else { errorEl.innerText = "NISN atau Sandi salah!"; return; }
            }
            window.render();
        };

        window.addCandidate = async () => {
            const name = document.getElementById('c-name').value;
            const vision = document.getElementById('c-vision').value;
            const mission = document.getElementById('c-mission').value;
            const photo = document.getElementById('c-photo').value || "https://ui-avatars.com/api/?name=" + name;
            if (!name || !vision || !mission) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'candidates'), {
                    name, photo, vision, mission, votes: 0
                });
                window.showModal("Berhasil", "Kandidat berhasil ditambahkan.");
                window.setAdminTab('candidates');
            } catch (e) { console.error(e); }
        };

        window.deleteCandidate = async (id) => {
            window.closeModal();
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', id));
            } catch (e) { console.error(e); }
        };

        window.addVoter = async () => {
            const name = document.getElementById('v-name').value;
            const nisn = document.getElementById('v-nisn').value;
            const cls = document.getElementById('v-class').value;
            const pass = document.getElementById('v-pass').value;
            if (!nisn || !name || !pass) return;
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', nisn), { 
                    name, nisn, class: cls, password: pass, hasVoted: false, votedFor: null 
                });
                window.showModal("Berhasil", `${name} terdaftar.`);
            } catch (e) { console.error(e); }
        };

        window.castVote = async (candId) => {
            if (!currentUser || currentUser.hasVoted) return;
            window.closeModal();
            const candidate = candidates.find(c => c.id === candId);
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', candId), { votes: increment(1) });
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', currentUser.nisn), { hasVoted: true, votedFor: candId });
                
                // Kirim Notifikasi Discord
                sendDiscordNotify(currentUser.name, currentUser.class, candidate.name);
                
                currentUser.hasVoted = true;
                localStorage.setItem('user_data', JSON.stringify(currentUser));
                window.render();
            } catch (e) { console.error(e); }
        };

        window.logout = () => { 
            currentRole = null; currentUser = null; currentView = 'selection'; 
            localStorage.clear();
            window.render(); 
        };

        window.render = function() {
            const appRoot = document.getElementById('app-root');
            if (!appRoot) return;
            
            const statusNode = `<div class="fixed top-6 left-6 z-[100] glass px-4 py-2 rounded-full flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full ${isConnected ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'}"></div>
                <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">${isConnected ? 'ONLINE' : 'OFFLINE'}</span>
            </div>`;

            const modalNode = modalConfig.show ? `<div class="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm">
                <div class="bg-slate-900 w-full max-w-xs rounded-[2.5rem] p-8 border border-white/10 animate-view">
                    <h3 class="text-center font-black text-white uppercase mb-2 tracking-tight">${modalConfig.title}</h3>
                    <p class="text-center text-[11px] text-slate-400 font-bold mb-8">${modalConfig.message}</p>
                    <div class="flex gap-2">
                        <button onclick="window.closeModal()" class="flex-1 py-4 bg-slate-800 text-slate-300 font-black rounded-2xl text-[9px] uppercase tracking-widest">Batal</button>
                        <button onclick="modalConfig.onConfirm()" class="flex-1 py-4 grad-primary text-white font-black rounded-2xl text-[9px] uppercase tracking-widest">Ya</button>
                    </div>
                </div>
            </div>` : "";

            const sidebarNode = (currentView === 'admin-panel' && showSidebar) ? `
            <div class="fixed inset-0 z-[250] bg-black/60 backdrop-blur-sm" onclick="window.toggleSidebar()">
                <div class="w-72 h-full bg-slate-950 border-r border-white/5 p-8 animate-sidebar flex flex-col" onclick="event.stopPropagation()">
                    <div class="mb-12">
                        <h2 class="text-xl font-black text-white italic">OSIS<span class="text-indigo-500">MENU</span></h2>
                    </div>
                    <nav class="space-y-2 flex-1">
                        <button onclick="window.setAdminTab('dashboard')" class="w-full flex items-center gap-4 p-4 rounded-2xl ${adminTab === 'dashboard' ? 'grad-primary text-white' : 'text-slate-400 hover:bg-white/5'} transition-all text-left">
                            <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                            <span class="text-xs font-black uppercase tracking-widest">Hasil Voting</span>
                        </button>
                        <button onclick="window.setAdminTab('candidates')" class="w-full flex items-center gap-4 p-4 rounded-2xl ${adminTab === 'candidates' ? 'grad-primary text-white' : 'text-slate-400 hover:bg-white/5'} transition-all text-left">
                            <i data-lucide="users" class="w-5 h-5"></i>
                            <span class="text-xs font-black uppercase tracking-widest">Data Kandidat</span>
                        </button>
                        <button onclick="window.setAdminTab('voters')" class="w-full flex items-center gap-4 p-4 rounded-2xl ${adminTab === 'voters' ? 'grad-primary text-white' : 'text-slate-400 hover:bg-white/5'} transition-all text-left">
                            <i data-lucide="user-check" class="w-5 h-5"></i>
                            <span class="text-xs font-black uppercase tracking-widest">Data Siswa</span>
                        </button>
                        <button onclick="window.setAdminTab('discord')" class="w-full flex items-center gap-4 p-4 rounded-2xl ${adminTab === 'discord' ? 'grad-primary text-white' : 'text-slate-400 hover:bg-white/5'} transition-all text-left">
                            <i data-lucide="webhook" class="w-5 h-5"></i>
                            <span class="text-xs font-black uppercase tracking-widest">Menu Discord</span>
                        </button>
                    </nav>
                    <button onclick="window.logout()" class="p-4 flex items-center gap-4 text-red-500 font-black text-xs uppercase tracking-widest"><i data-lucide="log-out"></i> Keluar</button>
                </div>
            </div>` : "";

            let content = "";
            if (currentView === 'selection') {
                content = `<div class="min-h-screen flex flex-col items-center justify-center p-6 animate-view">
                    <div class="text-center mb-16">
                        <div class="inline-flex p-6 bg-slate-900 rounded-[2rem] border border-white/5 mb-6"><i data-lucide="shield-check" class="w-10 h-10 text-indigo-500"></i></div>
                        <h1 class="text-3xl font-black text-white tracking-tighter italic uppercase">E-VOTING<br><span class="text-indigo-500 font-normal">OSIS PRO v5</span></h1>
                    </div>
                    <div class="w-full max-w-xs space-y-4">
                        <button onclick="window.renderLogin('voter')" class="w-full bg-slate-900 p-6 rounded-[2rem] border border-white/10 hover:border-indigo-500 transition-all active:scale-95">
                            <div class="flex items-center gap-4 text-left">
                                <div class="w-12 h-12 grad-primary text-white rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="user"></i></div>
                                <div><p class="font-black text-white text-sm uppercase">Siswa</p><p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Bilik Suara</p></div>
                            </div>
                        </button>
                        <button onclick="window.renderLogin('admin')" class="w-full bg-slate-900/50 p-6 rounded-[2rem] border border-white/5 hover:border-slate-400 transition-all active:scale-95">
                            <div class="flex items-center gap-4 text-left">
                                <div class="w-12 h-12 bg-slate-800 text-slate-500 rounded-2xl flex items-center justify-center"><i data-lucide="lock"></i></div>
                                <div><p class="font-black text-white text-sm uppercase">Admin</p><p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Kelola Data</p></div>
                            </div>
                        </button>
                    </div>
                </div>`;
            } else if (currentView.includes('login')) {
                const isAdmin = currentView === 'admin-login';
                content = `<div class="min-h-screen flex items-center justify-center p-6 animate-view">
                    <div class="w-full max-w-sm">
                        <button onclick="window.logout()" class="mb-8 flex items-center gap-2 text-[10px] font-black text-slate-500 uppercase tracking-widest"><i data-lucide="arrow-left" class="w-3 h-3"></i> Kembali</button>
                        <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5">
                            <h2 class="text-xl font-black text-white mb-8 tracking-tighter italic uppercase">${isAdmin ? 'Admin' : 'Siswa'}<span class="text-indigo-500 ml-1 font-normal">Login</span></h2>
                            <div class="space-y-4">
                                <input id="login-user" type="text" autocomplete="off" class="w-full p-4 bg-slate-800 text-white rounded-2xl outline-none focus:border-indigo-500 border border-transparent font-bold text-xs" placeholder="NISN / Username">
                                <input id="login-pass" type="password" autocomplete="off" class="w-full p-4 bg-slate-800 text-white rounded-2xl outline-none focus:border-indigo-500 border border-transparent font-bold text-xs" placeholder="Sandi Verifikasi">
                                <p id="login-error" class="text-red-500 text-[9px] font-black uppercase text-center min-h-[1rem]"></p>
                                <button onclick="window.handleLogin('${isAdmin ? 'admin' : 'voter'}')" class="w-full py-5 grad-primary text-white font-black rounded-2xl shadow-xl uppercase text-[10px] tracking-widest active:scale-95">Masuk</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            } else if (currentView === 'admin-panel') {
                const votedCount = voters.filter(v => v.hasVoted).length;

                content = `
                <div class="min-h-screen p-4 md:p-8 pt-24 animate-view">
                    <div class="max-w-5xl mx-auto pb-20">
                        <header class="bg-slate-900 p-6 rounded-[2.5rem] flex justify-between items-center border border-white/10 mb-8">
                            <div class="flex items-center gap-4">
                                <button onclick="window.toggleSidebar()" class="w-12 h-12 bg-slate-800 hover:bg-indigo-600 rounded-2xl flex items-center justify-center text-white transition-all shadow-lg active:scale-90">
                                    <i data-lucide="layout-grid"></i>
                                </button>
                                <div><h2 class="text-lg font-black text-white uppercase italic">Admin Panel</h2></div>
                            </div>
                            <div class="text-right hidden sm:block">
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Total Partisipasi</p>
                                <p class="text-lg font-black text-emerald-500">${votedCount} / ${voters.length}</p>
                            </div>
                        </header>

                        ${adminTab === 'dashboard' ? `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                ${candidates.map(c => {
                                    const p = votedCount > 0 ? Math.round((c.votes/votedCount)*100) : 0;
                                    return `<div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5 relative">
                                        <div class="flex items-center gap-5 mb-8">
                                            <img src="${c.photo}" class="w-20 h-20 rounded-3xl object-cover ring-4 ring-slate-800">
                                            <div>
                                                <h3 class="font-black text-white uppercase tracking-tight">${c.name}</h3>
                                                <p class="text-2xl font-black text-indigo-500">${c.votes} <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest ml-1">Suara</span></p>
                                            </div>
                                        </div>
                                        <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden mb-4">
                                            <div class="h-full grad-primary" style="width:${p}%"></div>
                                        </div>
                                        <p class="text-[10px] font-black text-indigo-500 text-right uppercase tracking-widest">${p}% Partisipasi</p>
                                    </div>`;
                                }).join('')}
                            </div>
                        ` : ''}

                        ${adminTab === 'discord' ? `
                            <div class="bg-slate-900 p-10 rounded-[3rem] border border-white/5 max-w-2xl mx-auto">
                                <div class="flex items-center gap-4 mb-8">
                                    <div class="w-14 h-14 bg-indigo-500/10 text-indigo-500 rounded-2xl flex items-center justify-center"><i data-lucide="webhook"></i></div>
                                    <div><h3 class="font-black text-white uppercase">Discord Webhook</h3><p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Kirim Notifikasi Real-time</p></div>
                                </div>
                                <div class="space-y-6">
                                    <div class="p-6 bg-slate-950/50 rounded-2xl border border-white/5 mb-4">
                                        <p class="text-[10px] text-slate-400 leading-relaxed font-bold">
                                            Setiap kali ada siswa yang melakukan voting, notifikasi detail (Nama, Kelas, Pilihan) akan dikirimkan ke channel Discord yang dihubungkan melalui Webhook ini.
                                        </p>
                                    </div>
                                    <div>
                                        <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Webhook URL</label>
                                        <input id="webhook-input" type="text" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-xs font-bold outline-none border border-transparent focus:border-indigo-500" placeholder="https://discord.com/api/webhooks/..." value="${discordWebhook}">
                                    </div>
                                    <button onclick="window.saveWebhook()" class="w-full py-5 grad-primary text-white font-black rounded-2xl text-[10px] uppercase tracking-widest active:scale-95">Simpan Pengaturan</button>
                                </div>
                            </div>
                        ` : ''}

                        ${adminTab === 'candidates' ? `
                             <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5">
                                    <h3 class="text-xs font-black text-indigo-500 uppercase mb-6 tracking-widest">Input Kandidat</h3>
                                    <div class="space-y-4">
                                        <input id="c-name" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-xs font-bold outline-none border border-transparent focus:border-indigo-500" placeholder="Nama Lengkap">
                                        <input id="c-photo" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-xs font-bold outline-none" placeholder="Link Foto">
                                        <textarea id="c-vision" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-xs font-bold outline-none h-24" placeholder="Visi"></textarea>
                                        <textarea id="c-mission" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-xs font-bold outline-none h-24" placeholder="Misi (Pisahkan dengan baris baru)"></textarea>
                                        <button onclick="window.addCandidate()" class="w-full py-4 grad-primary text-white font-black rounded-2xl text-[10px] uppercase tracking-widest">Simpan Data</button>
                                    </div>
                                </div>
                                <div class="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                                    ${candidates.map(c => `
                                        <div class="bg-slate-900 p-6 rounded-[2rem] border border-white/5 flex items-center justify-between">
                                            <div class="flex items-center gap-4">
                                                <img src="${c.photo}" class="w-12 h-12 rounded-xl object-cover">
                                                <div><p class="font-black text-xs uppercase text-white">${c.name}</p><p class="text-[9px] text-indigo-500 font-bold">${c.votes} Suara</p></div>
                                            </div>
                                            <button onclick="window.showModal('Hapus', 'Hapus ${c.name}?', () => window.deleteCandidate('${c.id}'))" class="w-10 h-10 bg-red-500/10 text-red-500 rounded-xl flex items-center justify-center"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${adminTab === 'voters' ? `
                             <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5">
                                    <h3 class="text-xs font-black text-indigo-500 uppercase mb-6 tracking-widest">Daftar Pemilih</h3>
                                    <div class="space-y-4">
                                        <input id="v-name" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-xs font-bold outline-none" placeholder="Nama Siswa">
                                        <div class="grid grid-cols-2 gap-3">
                                            <input id="v-nisn" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-xs font-bold outline-none" placeholder="NISN">
                                            <input id="v-class" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-xs font-bold outline-none" placeholder="Kelas">
                                        </div>
                                        <input id="v-pass" class="no-chrome-warning w-full p-4 bg-slate-800 text-white rounded-2xl text-xs font-bold outline-none" placeholder="Sandi Login">
                                        <button onclick="window.addVoter()" class="w-full py-4 bg-white text-slate-900 font-black rounded-2xl text-[10px] uppercase tracking-widest">Tambahkan Siswa</button>
                                    </div>
                                </div>
                                <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5">
                                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Database Siswa (${voters.length})</h3>
                                    <div class="space-y-2 max-h-[400px] overflow-y-auto custom-scrollbar pr-2">
                                        ${voters.map(v => `
                                            <div class="p-4 rounded-2xl border ${v.hasVoted ? 'bg-emerald-500/5 border-emerald-500/10' : 'bg-slate-800/40 border-white/5'} flex justify-between items-center">
                                                <div><p class="text-[10px] font-black text-white uppercase">${v.name}</p><p class="text-[8px] text-slate-500 font-bold">${v.nisn} • ${v.class}</p></div>
                                                <div class="px-3 py-1 rounded-full ${v.hasVoted ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-500'} text-[7px] font-black uppercase tracking-tighter">${v.hasVoted ? 'Sudah Memilih' : 'Belum Memilih'}</div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                             </div>
                        ` : ''}
                    </div>
                </div>`;
            } else if (currentView === 'voter-panel') {
                content = `<div class="min-h-screen flex flex-col items-center justify-center p-6 animate-view">
                    <div class="w-full max-w-5xl">
                        <header class="text-center mb-12">
                            <h2 class="text-3xl font-black text-white tracking-tighter italic uppercase">${currentUser.name}</h2>
                            <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mt-2">${currentUser.class} • Bilik Suara</p>
                        </header>
                        ${currentUser.hasVoted ? `
                            <div class="bg-slate-900 p-12 rounded-[4rem] border border-white/5 text-center animate-view max-w-lg mx-auto shadow-2xl">
                                <div class="w-20 h-20 bg-emerald-500/10 text-emerald-500 rounded-3xl flex items-center justify-center mx-auto mb-8 text-3xl shadow-sm"><i data-lucide="check-circle-2"></i></div>
                                <h3 class="text-xl font-black text-white uppercase mb-3 tracking-tight">Terima Kasih!</h3>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-10 leading-loose">Suara Anda telah resmi tercatat di database sistem.</p>
                                <button onclick="window.logout()" class="px-12 py-5 grad-primary text-white font-black rounded-2xl text-[10px] uppercase tracking-widest active:scale-95 shadow-lg">Keluar Sesi</button>
                            </div>
                        ` : `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                ${candidates.map((c, i) => `
                                    <div class="bg-slate-900 rounded-[3.5rem] border border-white/5 overflow-hidden flex flex-col group shadow-2xl">
                                        <div class="p-8 pb-4 text-center">
                                            <div class="relative inline-block mb-6">
                                                <img src="${c.photo}" class="w-40 h-40 rounded-[3rem] object-cover ring-[8px] ring-slate-800 group-hover:ring-indigo-500 transition-all">
                                                <div class="absolute -top-3 -right-3 w-12 h-12 grad-primary text-white rounded-2xl flex items-center justify-center font-black text-xl">${i+1}</div>
                                            </div>
                                            <h4 class="text-xl font-black text-white uppercase tracking-tight mb-6">${c.name}</h4>
                                            
                                            <div class="space-y-4 text-left bg-slate-800/50 p-6 rounded-[2rem] border border-white/5 mb-8">
                                                <div>
                                                    <p class="text-[8px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-1">Visi</p>
                                                    <p class="text-[10px] text-slate-300 font-bold leading-relaxed">${c.vision}</p>
                                                </div>
                                                <div>
                                                    <p class="text-[8px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-1">Misi</p>
                                                    <div class="text-[10px] text-slate-400 font-bold leading-relaxed">
                                                        ${c.mission ? c.mission.split('\n').filter(m => m.trim()).map(m => `• ${m}`).join('<br>') : '-'}
                                                    </div>
                                                </div>
                                            </div>

                                            <button onclick="window.showModal('Konfirmasi', 'Kirim suara untuk ${c.name}?', () => window.castVote('${c.id}'))" class="w-full py-5 bg-white text-slate-900 font-black rounded-3xl text-[10px] uppercase hover:bg-indigo-500 hover:text-white transition-all active:scale-95 mb-4">Pilih Sekarang</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                </div>`;
            }

            appRoot.innerHTML = content + statusNode + modalNode + sidebarNode;
            lucide.createIcons();
        };

        window.renderLogin = (type) => { 
            currentView = type + '-login'; 
            localStorage.setItem('current_view', currentView);
            window.render(); 
        };

        window.onload = startApp;
    </script>
</head>
<body class="selection:bg-indigo-500/30 overflow-x-hidden">
    <div id="app-root"></div>
</body>
</html>
