<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-VOTE OSIS Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .mesh-bg {
            background-image: radial-gradient(at 0% 0%, hsla(230,100%,97%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(230,100%,97%,1) 0, transparent 50%);
        }
        #auth-loading {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .loading-hidden { opacity: 0; pointer-events: none; visibility: hidden; transition: all 0.5s ease; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="mesh-bg min-h-screen text-slate-900 antialiased p-4">

    <!-- Loading Screen -->
    <div id="auth-loading">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest animate-pulse">Sinkronisasi Database...</p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <!-- Screen: Selection -->
        <div id="view-selection" class="min-h-[85vh] flex flex-col items-center justify-center space-y-6 max-w-sm mx-auto">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-xl border border-slate-50">
                    <span class="text-4xl">🗳️</span>
                </div>
                <h1 class="text-3xl font-black tracking-tighter uppercase italic text-slate-900">E-VOTE <span class="text-indigo-600">OSIS</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Digital Voting System v4.5</p>
            </div>

            <button onclick="openLogin('voter')" class="w-full bg-white p-6 rounded-[2.5rem] shadow-xl shadow-slate-200/40 border border-white flex items-center gap-5 active:scale-95 transition-transform">
                <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl">👤</div>
                <div class="text-left">
                    <h3 class="font-black text-slate-800">Login Siswa</h3>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wide">Gunakan NISN & Pass</p>
                </div>
            </button>

            <button onclick="openLogin('admin')" class="w-full bg-slate-900 p-6 rounded-[2.5rem] shadow-xl shadow-slate-900/10 border border-slate-700 flex items-center gap-5 text-white active:scale-95 transition-transform">
                <div class="w-14 h-14 bg-slate-800 text-indigo-400 rounded-2xl flex items-center justify-center text-2xl">⚙️</div>
                <div class="text-left">
                    <h3 class="font-black text-white">Login Panitia</h3>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wide">Panel Administrasi</p>
                </div>
            </button>
        </div>

        <!-- Screen: Login Form -->
        <div id="view-login" class="hidden min-h-[85vh] flex items-center justify-center">
            <div id="login-card" class="p-8 rounded-[3rem] shadow-2xl w-full max-w-sm border transition-all">
                <button onclick="goBack()" class="text-[10px] font-black mb-8 block uppercase tracking-widest opacity-60">← Kembali</button>
                <h2 class="text-2xl font-black mb-6 tracking-tighter" id="login-title">Portal Akses</h2>
                <div class="space-y-4">
                    <input id="login-user" type="text" placeholder="Username / NISN" class="w-full p-4 rounded-2xl bg-white text-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500 font-bold shadow-sm text-sm">
                    <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-white text-slate-900 border-none outline-none focus:ring-2 focus:ring-indigo-500 font-bold shadow-sm text-sm">
                    <p id="login-error" class="hidden text-red-500 text-[10px] font-bold text-center bg-red-50 p-3 rounded-xl border border-red-100"></p>
                    <button id="btn-do-login" class="w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl transition-all active:scale-95">Konfirmasi Masuk</button>
                </div>
            </div>
        </div>

        <!-- Screen: Voter (Siswa) -->
        <div id="view-voter" class="hidden max-w-md mx-auto py-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-white flex justify-between items-center mb-6 mx-2">
                <div>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Siswa Terverifikasi</p>
                    <h2 id="display-voter-name" class="text-lg font-black text-slate-800 tracking-tight">-</h2>
                </div>
                <button onclick="location.reload()" class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center font-bold">✕</button>
            </div>
            <div id="candidate-list" class="space-y-5 px-2"></div>
        </div>

        <!-- Screen: Admin -->
        <div id="view-admin" class="hidden max-w-7xl mx-auto py-4">
            <div class="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm border border-white mb-6 mx-2 px-6">
                <h2 class="font-black text-slate-800 uppercase text-[10px] tracking-widest italic">Admin Dashboard</h2>
                <button onclick="location.reload()" class="text-[10px] font-black text-red-500 bg-red-50 px-4 py-2 rounded-xl uppercase">Logout</button>
            </div>
            
            <div class="grid lg:grid-cols-3 gap-6 px-2">
                <!-- Col 1: Stats & Config -->
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                        <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Hasil Voting</h3>
                        <div id="vote-stats-container" class="space-y-4"></div>
                    </div>
                    <!-- Discord Config (Permanen) -->
                    <div class="bg-indigo-600 p-6 rounded-[2.5rem] shadow-sm text-white">
                        <h3 class="font-black text-[10px] text-indigo-200 uppercase mb-4 tracking-widest">Discord Integration</h3>
                        <input id="discord-webhook-url" type="password" placeholder="Paste Discord Webhook URL" class="w-full p-3 bg-indigo-700 rounded-xl text-[10px] font-bold outline-none border border-indigo-500 text-white placeholder-indigo-300">
                        <button id="save-webhook-btn" class="w-full mt-3 bg-white text-indigo-600 p-2 rounded-xl font-black text-[9px] uppercase tracking-widest hover:bg-indigo-50 transition-colors">Simpan Webhook ke Database</button>
                        <p class="text-[8px] mt-2 opacity-70 font-medium">*URL ini tersimpan di database dan berlaku untuk semua admin.</p>
                    </div>
                </div>

                <!-- Col 2: Input Kandidat -->
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                    <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Kelola Kandidat</h3>
                    <div class="space-y-3">
                        <input id="new-c-name" placeholder="Nama Lengkap" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-slate-100 text-slate-900">
                        <input id="new-c-img" placeholder="URL Foto (Contoh: https://...)" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-slate-100 text-slate-900">
                        <textarea id="new-c-vision" placeholder="Visi & Misi Singkat" class="w-full p-3 bg-slate-50 rounded-xl text-xs outline-none h-24 border border-slate-100 text-slate-900"></textarea>
                        <button id="save-candidate-btn" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-indigo-700 transition-colors">Simpan Paslon</button>
                    </div>
                </div>

                <!-- Col 3: Data Pemilih -->
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white overflow-hidden">
                    <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Registrasi Pemilih</h3>
                    <div class="grid grid-cols-1 gap-2 mb-4">
                        <input id="new-v-name" placeholder="Nama Siswa" class="p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 text-slate-900">
                        <div class="grid grid-cols-2 gap-2">
                            <input id="new-v-nisn" placeholder="NISN" class="p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 text-slate-900">
                            <input id="new-v-pass" placeholder="Password" class="p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 text-slate-900">
                        </div>
                    </div>
                    <button id="save-voter-btn" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold text-[10px] uppercase tracking-widest mb-6 hover:bg-black transition-colors">Tambah Siswa</button>
                    
                    <div class="mt-4 border-t border-slate-50 pt-4">
                        <div id="voter-table" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, runTransaction, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFD_ZOL4RAyaadaGdk5PJb8BIwG6GInOE",
            authDomain: "testsaja-39ab7.firebaseapp.com",
            projectId: "testsaja-39ab7",
            storageBucket: "testsaja-39ab7.firebasestorage.app",
            messagingSenderId: "503650943182",
            appId: "1:503650943182:web:eec5678291f3bf2774509f",
            measurementId: "G-VSQ3SHGHQL"
        };

        const appId = "osis-v4-final";
        let db, auth;
        let candidates = [];
        let voters = [];
        let currentUser = null;
        let currentWebhook = "";

        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    startSyncing();
                    document.getElementById('auth-loading').classList.add('loading-hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                }
            });

            signInAnonymously(auth);
        } catch (err) { console.error(err); }

        function startSyncing() {
            const cCol = collection(db, 'artifacts', appId, 'public', 'data', 'candidates');
            const vCol = collection(db, 'artifacts', appId, 'public', 'data', 'voters');
            
            // Sync Config (Webhook) dari Database
            const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
            onSnapshot(configRef, (docSnap) => {
                if(docSnap.exists()){
                    currentWebhook = docSnap.data().webhookUrl || "";
                    document.getElementById('discord-webhook-url').value = currentWebhook;
                }
            });

            onSnapshot(cCol, (s) => {
                candidates = s.docs.map(d => ({ id: d.id, ...d.data() }));
                updateAdminDisplay();
                if (currentUser) updateVoterDisplay();
            });

            onSnapshot(vCol, (s) => {
                voters = s.docs.map(d => ({ id: d.id, ...d.data() }));
                if (currentUser) {
                    const updated = voters.find(v => v.nisn === currentUser.nisn);
                    if (updated) { currentUser = updated; updateVoterDisplay(); }
                }
                updateAdminDisplay();
            });
        }

        // Simpan Webhook ke Database agar tidak hilang saat logout
        document.getElementById('save-webhook-btn').onclick = async () => {
            const url = document.getElementById('discord-webhook-url').value.trim();
            try {
                const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
                await setDoc(configRef, { webhookUrl: url }, { merge: true });
                alert("Webhook berhasil disimpan ke Database!");
            } catch (err) {
                console.error("Gagal simpan webhook:", err);
            }
        };

        async function sendDiscordNotification(voterName, candidateName) {
            if (!currentWebhook) return;

            const payload = {
                username: "E-VOTE OSIS NOTIFIER",
                avatar_url: "https://cdn-icons-png.flaticon.com/512/927/927295.png",
                embeds: [{
                    title: "🗳️ Suara Baru Masuk!",
                    description: `Pesta demokrasi berlanjut!`,
                    color: 5814783,
                    fields: [
                        { name: "👤 Nama Pemilih", value: voterName, inline: true },
                        { name: "✅ Memilih", value: candidateName, inline: true },
                        { name: "⏰ Waktu", value: new Date().toLocaleString('id-ID'), inline: false }
                    ],
                    footer: { text: "E-Voting Digital System • Cloud Sync Active" }
                }]
            };

            try {
                await fetch(currentWebhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (err) { console.error("Discord error:", err); }
        }

        /** LOGIN & NAV **/
        window.openLogin = (role) => {
            window.activeRole = role;
            document.getElementById('view-selection').classList.add('hidden');
            document.getElementById('view-login').classList.remove('hidden');
            const card = document.getElementById('login-card');
            const btn = document.getElementById('btn-do-login');
            
            document.getElementById('login-user').value = "";
            document.getElementById('login-pass').value = "";
            
            if (role === 'admin') {
                card.className = "bg-slate-900 p-8 rounded-[3rem] shadow-2xl w-full max-sm text-white border-slate-800";
                btn.className = "w-full bg-indigo-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest mt-4";
            } else {
                card.className = "bg-white p-8 rounded-[3rem] shadow-2xl w-full max-sm text-slate-900 border-white";
                btn.className = "w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest mt-4 shadow-lg shadow-indigo-100";
            }
        };

        window.goBack = () => {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-selection').classList.remove('hidden');
        };

        document.getElementById('btn-do-login').onclick = () => {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            const err = document.getElementById('login-error');
            err.classList.add('hidden');

            if (window.activeRole === 'admin') {
                if (u === 'admin' && p === 'adminosis2024') {
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                } else {
                    err.innerText = "Kredensial Admin Salah!";
                    err.classList.remove('hidden');
                }
            } else {
                const match = voters.find(v => v.nisn === u && v.password === p);
                if (match) {
                    currentUser = match;
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-voter').classList.remove('hidden');
                    document.getElementById('display-voter-name').innerText = match.name;
                    updateVoterDisplay();
                } else {
                    err.innerText = "NISN atau Password Salah!";
                    err.classList.remove('hidden');
                }
            }
        };

        /** VOTING CORE **/
        window.processVote = async (candId) => {
            if (!currentUser || currentUser.hasVoted) return;
            const targetCandidate = candidates.find(c => c.id === candId);
            if (!targetCandidate) return;

            const cRef = doc(db, 'artifacts', appId, 'public', 'data', 'candidates', candId);
            const vRef = doc(db, 'artifacts', appId, 'public', 'data', 'voters', currentUser.nisn);

            try {
                await runTransaction(db, async (tx) => {
                    const cDoc = await tx.get(cRef);
                    tx.update(cRef, { votes: (cDoc.data().votes || 0) + 1 });
                    tx.update(vRef, { hasVoted: true, votedFor: candId });
                });
                
                sendDiscordNotification(currentUser.name, targetCandidate.name);

            } catch (e) { console.error(e); }
        };

        /** ADMIN ACTIONS **/
        window.deleteVoter = async (nisn) => {
            const voter = voters.find(v => v.nisn === nisn);
            if (!voter) return;
            
            if (confirm(`Hapus pemilih ${voter.name}?`)) {
                try {
                    await runTransaction(db, async (tx) => {
                        if (voter.hasVoted && voter.votedFor) {
                            const cRef = doc(db, 'artifacts', appId, 'public', 'data', 'candidates', voter.votedFor);
                            const cDoc = await tx.get(cRef);
                            if (cDoc.exists()) {
                                const currentVotes = cDoc.data().votes || 0;
                                tx.update(cRef, { votes: Math.max(0, currentVotes - 1) });
                            }
                        }
                        const vRef = doc(db, 'artifacts', appId, 'public', 'data', 'voters', nisn);
                        tx.delete(vRef);
                    });
                } catch (e) { console.error(e); }
            }
        };

        window.deleteCandidate = async (id) => {
            if(confirm("Hapus kandidat ini secara permanen?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', id));
            }
        };

        document.getElementById('save-candidate-btn').onclick = async () => {
            const name = document.getElementById('new-c-name').value;
            const imgUrl = document.getElementById('new-c-img').value;
            const vision = document.getElementById('new-c-vision').value;
            if(!name || !vision) return;
            const finalImg = imgUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6366f1&color=fff&size=128`;
            await setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'candidates')), { 
                name, vision, votes: 0, img: finalImg 
            });
            document.getElementById('new-c-name').value = ""; 
            document.getElementById('new-c-img').value = "";
            document.getElementById('new-c-vision').value = "";
        };

        document.getElementById('save-voter-btn').onclick = async () => {
            const n = document.getElementById('new-v-name').value;
            const ni = document.getElementById('new-v-nisn').value;
            const pa = document.getElementById('new-v-pass').value;
            if(!n || !ni || !pa) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', ni), { 
                name: n, nisn: ni, password: pa, hasVoted: false, votedFor: null 
            });
            document.getElementById('new-v-name').value = ""; 
            document.getElementById('new-v-nisn').value = ""; 
            document.getElementById('new-v-pass').value = "";
        };

        /** RENDER UI **/
        function updateAdminDisplay() {
            const stats = document.getElementById('vote-stats-container');
            const total = candidates.reduce((a, b) => a + (b.votes || 0), 0);
            if (stats) {
                stats.innerHTML = candidates.map(c => {
                    const pct = total > 0 ? Math.round((c.votes/total)*100) : 0;
                    return `<div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 relative group">
                        <button onclick="deleteCandidate('${c.id}')" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-all text-[10px] font-bold">Hapus</button>
                        <div class="flex items-center gap-3 mb-3">
                            <img src="${c.img}" class="w-8 h-8 rounded-lg object-cover bg-indigo-100 shadow-sm">
                            <div class="flex-1">
                                <div class="flex justify-between text-[10px] font-black uppercase">
                                    <span class="truncate pr-2">${c.name}</span>
                                    <span class="text-indigo-600 shrink-0">${c.votes} Suara</span>
                                </div>
                                <p class="text-[8px] text-slate-400 font-bold">${pct}% Perolehan</p>
                            </div>
                        </div>
                        <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-indigo-600 h-full transition-all duration-700" style="width:${pct}%"></div>
                        </div>
                    </div>`;
                }).join('') || '<p class="text-[10px] text-center py-8 text-slate-400 font-bold italic">Belum ada kandidat</p>';
            }
            
            const table = document.getElementById('voter-table');
            if (table) {
                table.innerHTML = voters.map(v => `
                    <div class="p-3 bg-slate-50 rounded-xl flex justify-between items-center border border-slate-100 group">
                        <div class="text-left flex-1">
                            <p class="text-[10px] font-black text-slate-800 uppercase tracking-tight">${v.name}</p>
                            <p class="text-[8px] text-slate-400 font-bold tracking-widest">${v.nisn} • Pw: ${v.password}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-[7px] font-black px-2 py-0.5 rounded-full ${v.hasVoted ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'} uppercase tracking-tighter">
                                ${v.hasVoted ? 'Sudah' : 'Belum'}
                            </div>
                            <button onclick="deleteVoter('${v.nisn}')" class="w-7 h-7 bg-red-50 text-red-400 rounded-lg flex items-center justify-center hover:bg-red-100 hover:text-red-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `).join('') || '<p class="text-[10px] text-center py-4 text-slate-400 font-bold uppercase">Belum ada pemilih</p>';
            }
        }

        function updateVoterDisplay() {
            const list = document.getElementById('candidate-list');
            if (currentUser.hasVoted) {
                list.innerHTML = `<div class="bg-white p-10 rounded-[3rem] text-center shadow-xl border border-white mt-10">
                    <div class="text-5xl mb-6">✨</div>
                    <h3 class="font-black text-slate-800 text-xl uppercase tracking-tighter">Voting Berhasil!</h3>
                    <p class="text-[11px] text-slate-400 mt-2 font-medium leading-relaxed">Terima kasih ${currentUser.name}, pilihan Anda telah masuk ke sistem.</p>
                    <button onclick="location.reload()" class="mt-8 text-[10px] font-black text-indigo-600 uppercase tracking-widest">Logout Sesi</button>
                </div>`;
                return;
            }
            list.innerHTML = candidates.map((c, i) => `
                <div class="bg-white rounded-[2.5rem] shadow-xl border border-white p-6 flex flex-col items-center text-center">
                    <div class="relative mb-4">
                        <img src="${c.img}" class="w-24 h-24 rounded-3xl object-cover shadow-lg border-2 border-slate-50">
                        <span class="absolute -bottom-2 -right-2 bg-indigo-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-black text-xs border-4 border-white">0${i+1}</span>
                    </div>
                    <h3 class="text-lg font-black text-slate-800 leading-tight">${c.name}</h3>
                    <p class="text-[10px] text-slate-400 my-4 leading-relaxed font-medium italic">"${c.vision}"</p>
                    <button onclick="processVote('${c.id}')" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all shadow-lg shadow-indigo-100">Pilih Paslon 0${i+1}</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
