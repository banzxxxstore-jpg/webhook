<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting OSIS v5 - Fixed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617;
            color: #f1f5f9;
            margin: 0;
            overflow-x: hidden;
        }

        .hide-password {
            -webkit-text-security: disc !important;
            text-security: disc !important;
        }

        .glass {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .grad-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
        }

        .grad-whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-view { animation: fadeIn 0.4s ease-out forwards; }

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #6366f1; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, deleteDoc, increment, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFD_ZOL4RAyaadaGdk5PJb8BIwG6GInOE",
            authDomain: "testsaja-39ab7.firebaseapp.com",
            projectId: "testsaja-39ab7",
            storageBucket: "testsaja-39ab7.firebasestorage.app",
            messagingSenderId: "503650943182",
            appId: "1:503650943182:web:eec5678291f3bf2774509f"
        };

        let db, auth, appId;
        let currentUser = null;
        let currentRole = null; 
        let currentView = 'selection'; 
        let adminTab = 'dashboard'; 
        let candidates = [];
        let voters = [];
        let isConnected = false;
        let showSidebar = false;
        
        let discordWebhook = '';
        let discordEnabled = false;
        let whatsappConfig = { token: '', target: '', enabled: false };

        let modalConfig = { show: false, title: '', message: '', onConfirm: null, isAlert: false };

        async function startApp() {
            try {
                appId = typeof __app_id !== 'undefined' ? __app_id : 'osis-evoting-v5-fixed';
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
                } else { 
                    await signInAnonymously(auth); 
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) startDataListeners();
                    window.render();
                });
            } catch (err) { console.error(err); }
        }

        function startDataListeners() {
            const basePath = ['artifacts', appId, 'public', 'data'];
            
            onSnapshot(collection(db, ...basePath, 'candidates'), (snap) => {
                candidates = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                isConnected = true;
                window.render();
            });

            onSnapshot(collection(db, ...basePath, 'voters'), (snap) => {
                voters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (currentRole === 'voter' && currentUser) {
                    const fresh = voters.find(v => v.nisn === currentUser.nisn);
                    if (fresh) currentUser = fresh;
                }
                window.render();
            });

            onSnapshot(doc(db, ...basePath, 'settings', 'notifications'), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    discordWebhook = data.discord || '';
                    discordEnabled = data.discordEnabled || false;
                    whatsappConfig = { 
                        token: data.wa_token || '', 
                        target: data.wa_target || '',
                        enabled: data.waEnabled || false
                    };
                    window.render();
                }
            });
        }

        // Global functions
        window.showModal = (title, message, onConfirm = null, isAlert = false) => {
            modalConfig = { show: true, title, message, onConfirm, isAlert };
            window.render();
        };

        window.closeModal = () => {
            modalConfig.show = false;
            window.render();
        };

        window.confirmAction = () => {
            if (modalConfig.onConfirm) modalConfig.onConfirm();
            window.closeModal();
        };

        window.setView = (view) => {
            currentView = view;
            window.render();
        };

        window.handleLogin = async (role) => {
            const userInp = document.getElementById('login-user').value.trim();
            const passInp = document.getElementById('login-pass').value.trim();
            const errorEl = document.getElementById('login-error');

            if (role === 'admin') {
                if (userInp === 'admin' && passInp === 'adminosis2024') {
                    currentRole = 'admin';
                    currentView = 'admin-panel';
                } else {
                    errorEl.innerText = "Akses Admin Ditolak!";
                }
            } else {
                const found = voters.find(v => v.nisn === userInp && v.password === passInp);
                if (found) {
                    currentRole = 'voter';
                    currentUser = found;
                    currentView = 'voter-panel';
                } else {
                    errorEl.innerText = "NISN atau Sandi salah!";
                }
            }
            window.render();
        };

        window.logout = () => {
            currentRole = null;
            currentUser = null;
            currentView = 'selection';
            window.render();
        };

        window.updateNotifications = async () => {
            const discord = document.getElementById('discord-url').value.trim();
            const wa_token = document.getElementById('wa-token').value.trim();
            const wa_target = document.getElementById('wa-target').value.trim();
            const dEnabled = document.getElementById('discord-toggle').checked;
            const wEnabled = document.getElementById('wa-toggle').checked;

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'notifications'), { 
                    discord, discordEnabled: dEnabled,
                    wa_token, wa_target, waEnabled: wEnabled 
                });
                window.showModal("SUKSES", "Konfigurasi notifikasi berhasil diperbarui!", null, true);
            } catch (e) { console.error(e); }
        };

        window.castVote = async (candId) => {
            if (!currentUser || currentUser.hasVoted) return;
            const cand = candidates.find(c => c.id === candId);
            const nextVotes = (cand.votes || 0) + 1;
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID');
            
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', candId), { votes: increment(1) });
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', currentUser.nisn), { hasVoted: true, votedFor: candId });
                
                if (discordEnabled && discordWebhook) {
                    fetch(discordWebhook, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            embeds: [{
                                title: "📩 Suara Baru Masuk!",
                                color: 5814783,
                                fields: [
                                    { name: "Waktu", value: `**${timeStr}**`, inline: true },
                                    { name: "Total Suara", value: `**${nextVotes} Suara**`, inline: true },
                                    { name: "Kandidat", value: cand.name, inline: false },
                                    { name: "Pemilih", value: `||${currentUser.name} (${currentUser.class})||`, inline: false }
                                ],
                                timestamp: now.toISOString()
                            }]
                        })
                    }).catch(e => console.log("Discord error:", e));
                }

                if (whatsappConfig.enabled && whatsappConfig.token && whatsappConfig.target) {
                    const message = `📩 *NOTIFIKASI VOTE*\n\nSuara masuk pukul: *${timeStr}*\n\n🗳️ *${cand.name}*\n📊 Total Voting: ${nextVotes} Suara\n\n👤 Pemilih: ${currentUser.name}\n🏫 Kelas: ${currentUser.class}`;
                    const formData = new FormData();
                    formData.append('target', whatsappConfig.target);
                    formData.append('message', message);

                    fetch('https://api.fonnte.com/send', {
                        method: 'POST',
                        headers: { 'Authorization': whatsappConfig.token },
                        body: formData
                    }).catch(e => console.log("WA error:", e));
                }
                
                window.render();
            } catch (e) { console.error(e); }
        };

        window.addCandidate = async () => {
            const name = document.getElementById('c-name').value;
            const vision = document.getElementById('c-vision').value;
            const mission = document.getElementById('c-mission').value;
            const photo = document.getElementById('c-photo').value || "https://ui-avatars.com/api/?name=" + name;
            if (!name) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'candidates'), {
                    name, photo, vision, mission, votes: 0
                });
                window.showModal("SUKSES", "Kandidat berhasil ditambahkan!", null, true);
            } catch (e) { console.error(e); }
        };

        window.deleteCandidate = async (id) => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', id));
        };

        window.addVoter = async () => {
            const name = document.getElementById('v-name').value;
            const nisn = document.getElementById('v-nisn').value;
            const cls = document.getElementById('v-class').value;
            const pass = document.getElementById('v-pass').value;
            if (!nisn || !name) return;
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', nisn), { 
                    name, nisn, class: cls, password: pass, hasVoted: false, votedFor: null 
                });
                window.showModal("BERHASIL", "Siswa berhasil didaftarkan!", null, true);
            } catch (e) { console.error(e); }
        };

        // FIXED: Menghapus voter sekaligus mengurangi jumlah suara kandidat jika voter sudah memilih
        window.deleteVoter = async (nisn) => {
            try {
                const voter = voters.find(v => v.nisn === nisn);
                if (voter && voter.hasVoted && voter.votedFor) {
                    // Kurangi jumlah suara dari kandidat terkait
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', voter.votedFor), { 
                        votes: increment(-1) 
                    });
                }
                // Hapus data pemilih
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', nisn));
            } catch (e) {
                console.error("Gagal menghapus voter:", e);
            }
        };

        window.toggleSidebar = () => { showSidebar = !showSidebar; window.render(); };
        window.setAdminTab = (tab) => { adminTab = tab; showSidebar = false; window.render(); };

        window.render = function() {
            const root = document.getElementById('app-root');
            if (!root) return;

            // Status Badge
            const statusHtml = `<div class="fixed top-6 left-6 z-[100] glass px-4 py-2 rounded-full flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full ${isConnected ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'}"></div>
                <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">${isConnected ? 'ONLINE' : 'CONNECTING'}</span>
            </div>`;

            // Modal Logic
            const modalHtml = modalConfig.show ? `<div class="fixed inset-0 z-[500] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm">
                <div class="bg-slate-900 w-full max-w-[320px] rounded-[2.5rem] p-8 border border-white/10 animate-view">
                    <h3 class="text-center font-black text-white uppercase mb-2 tracking-tight">${modalConfig.title}</h3>
                    <p class="text-center text-[11px] text-slate-400 font-bold mb-8">${modalConfig.message}</p>
                    <div class="flex gap-2">
                        ${modalConfig.isAlert ? `
                            <button onclick="window.closeModal()" class="w-full py-4 grad-primary text-white font-black rounded-2xl text-[10px] uppercase tracking-widest">OKE</button>
                        ` : `
                            <button onclick="window.closeModal()" class="flex-1 py-4 bg-slate-800 text-slate-300 font-black rounded-2xl text-[9px] uppercase tracking-widest">BATAL</button>
                            <button onclick="window.confirmAction()" class="flex-1 py-4 grad-primary text-white font-black rounded-2xl text-[9px] uppercase tracking-widest">YA</button>
                        `}
                    </div>
                </div>
            </div>` : "";

            // Sidebar Logic
            const sidebarHtml = (currentView === 'admin-panel' && showSidebar) ? `
            <div class="fixed inset-0 z-[400] bg-black/60 backdrop-blur-sm" onclick="window.toggleSidebar()">
                <div class="w-72 h-full bg-slate-950 border-r border-white/5 p-8 flex flex-col" onclick="event.stopPropagation()">
                    <div class="mb-12"><h2 class="text-xl font-black text-white italic">OSIS<span class="text-indigo-500 font-normal">MENU</span></h2></div>
                    <nav class="space-y-2 flex-1">
                        <button onclick="window.setAdminTab('dashboard')" class="w-full flex items-center gap-4 p-4 rounded-2xl ${adminTab === 'dashboard' ? 'grad-primary text-white' : 'text-slate-400 hover:bg-white/5'} text-left">
                            <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                            <span class="text-xs font-black uppercase tracking-widest">Hasil Vote</span>
                        </button>
                        <button onclick="window.setAdminTab('candidates')" class="w-full flex items-center gap-4 p-4 rounded-2xl ${adminTab === 'candidates' ? 'grad-primary text-white' : 'text-slate-400 hover:bg-white/5'} text-left">
                            <i data-lucide="users" class="w-5 h-5"></i>
                            <span class="text-xs font-black uppercase tracking-widest">Kandidat</span>
                        </button>
                        <button onclick="window.setAdminTab('voters')" class="w-full flex items-center gap-4 p-4 rounded-2xl ${adminTab === 'voters' ? 'grad-primary text-white' : 'text-slate-400 hover:bg-white/5'} text-left">
                            <i data-lucide="user-check" class="w-5 h-5"></i>
                            <span class="text-xs font-black uppercase tracking-widest">Pemilih</span>
                        </button>
                        <button onclick="window.setAdminTab('settings')" class="w-full flex items-center gap-4 p-4 rounded-2xl ${adminTab === 'settings' ? 'grad-primary text-white' : 'text-slate-400 hover:bg-white/5'} text-left">
                            <i data-lucide="settings" class="w-5 h-5"></i>
                            <span class="text-xs font-black uppercase tracking-widest">Pengaturan</span>
                        </button>
                    </nav>
                    <button onclick="window.logout()" class="p-4 flex items-center gap-4 text-red-500 font-black text-xs uppercase tracking-widest"><i data-lucide="log-out"></i> Keluar</button>
                </div>
            </div>` : "";

            let content = "";

            if (currentView === 'selection') {
                content = `<div class="min-h-screen flex flex-col items-center justify-center p-6 animate-view">
                    <div class="text-center mb-16">
                        <h1 class="text-3xl font-black text-white italic tracking-tighter uppercase leading-tight">E-VOTING<br><span class="text-indigo-500 font-normal">OSIS PRO v5</span></h1>
                    </div>
                    <div class="w-full max-w-[320px] space-y-4">
                        <button onclick="window.setView('voter-login')" class="w-full bg-slate-900 p-6 rounded-[2rem] border border-white/10 flex items-center gap-4 active:scale-95 transition-all">
                            <div class="w-12 h-12 grad-primary rounded-2xl flex items-center justify-center text-white"><i data-lucide="user"></i></div>
                            <div class="text-left"><p class="font-black text-white text-sm uppercase">Siswa</p><p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Masuk Bilik</p></div>
                        </button>
                        <button onclick="window.setView('admin-login')" class="w-full bg-slate-900/50 p-6 rounded-[2rem] border border-white/5 flex items-center gap-4 active:scale-95 transition-all">
                            <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center text-slate-500"><i data-lucide="lock"></i></div>
                            <div class="text-left"><p class="font-black text-white text-sm uppercase">Admin</p><p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Otoritas</p></div>
                        </button>
                    </div>
                </div>`;
            } else if (currentView.includes('login')) {
                const isAdmin = currentView === 'admin-login';
                content = `<div class="min-h-screen flex items-center justify-center p-6 animate-view">
                    <div class="w-full max-w-[360px]">
                        <button onclick="window.setView('selection')" class="mb-8 text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2"><i data-lucide="arrow-left" class="w-3 h-3"></i> Kembali</button>
                        <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5">
                            <h2 class="text-xl font-black text-white mb-8 italic uppercase">${isAdmin ? 'Admin' : 'Siswa'}<span class="text-indigo-500 ml-1 font-normal">Login</span></h2>
                            <div class="space-y-4">
                                <input id="login-user" type="text" autocomplete="off" class="w-full p-4 bg-slate-800 text-white rounded-2xl outline-none focus:border-indigo-500 border border-transparent font-bold text-xs" placeholder="${isAdmin ? 'Username' : 'NISN'}">
                                <input id="login-pass" type="text" autocomplete="off" class="hide-password w-full p-4 bg-slate-800 text-white rounded-2xl outline-none focus:border-indigo-500 border border-transparent font-bold text-xs" placeholder="Password">
                                <p id="login-error" class="text-red-500 text-[9px] font-black uppercase text-center min-h-[1.2rem]"></p>
                                <button onclick="window.handleLogin('${isAdmin ? 'admin' : 'voter'}')" class="w-full py-5 grad-primary text-white font-black rounded-2xl uppercase text-[10px] tracking-widest active:scale-95 transition-all shadow-xl shadow-indigo-500/20">Masuk</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            } else if (currentView === 'voter-panel') {
                if (currentUser.hasVoted) {
                    content = `<div class="min-h-screen flex items-center justify-center p-6 text-center animate-view">
                        <div class="bg-slate-900 p-10 rounded-[3rem] border border-white/5 max-w-sm w-full">
                            <div class="w-20 h-20 bg-emerald-500/10 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="check-circle" class="w-10 h-10"></i></div>
                            <h2 class="text-xl font-black text-white uppercase mb-2">Terima Kasih!</h2>
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-8">Pilihan Anda Sudah Disimpan.</p>
                            <button onclick="window.logout()" class="w-full py-4 bg-slate-800 text-white font-black rounded-2xl text-[10px] uppercase tracking-widest">Logout</button>
                        </div>
                    </div>`;
                } else {
                    content = `<div class="min-h-screen p-6 pt-24 max-w-2xl mx-auto animate-view">
                        <div class="mb-12"><h2 class="text-2xl font-black text-white uppercase italic tracking-tighter">SURAT <span class="text-indigo-500">SUARA</span></h2></div>
                        <div class="grid grid-cols-1 gap-6 pb-12">
                            ${candidates.map(c => `
                                <div class="bg-slate-900 p-6 rounded-[2.5rem] border border-white/5 flex flex-col md:flex-row items-center gap-6">
                                    <img src="${c.photo}" class="w-32 h-32 rounded-3xl object-cover ring-4 ring-slate-800">
                                    <div class="flex-1 text-center md:text-left">
                                        <h3 class="font-black text-white uppercase mb-1 tracking-tight">${c.name}</h3>
                                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-4 leading-relaxed line-clamp-2">${c.vision || 'Visi & Misi Belum Diisi'}</p>
                                        <button onclick="window.showModal('KONFIRMASI', 'Berikan suara untuk ${c.name}?', () => window.castVote('${c.id}'))" class="px-8 py-3 grad-primary text-white font-black rounded-2xl text-[9px] uppercase tracking-widest active:scale-95 transition-all">Pilih Paslon</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                }
            } else if (currentView === 'admin-panel') {
                const votedCount = voters.filter(v => v.hasVoted).length;
                content = `<div class="min-h-screen p-4 md:p-8 pt-24 animate-view">
                    <div class="max-w-5xl mx-auto pb-20">
                        <header class="bg-slate-900 p-6 rounded-[2.5rem] flex justify-between items-center border border-white/10 mb-8">
                            <button onclick="window.toggleSidebar()" class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center text-white active:scale-90 transition-all"><i data-lucide="layout-grid"></i></button>
                            <div class="text-right">
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Partisipasi</p>
                                <p class="text-lg font-black text-indigo-500">${votedCount} / ${voters.length}</p>
                            </div>
                        </header>

                        ${adminTab === 'dashboard' ? `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                ${candidates.map(c => {
                                    const p = votedCount > 0 ? Math.round((c.votes/votedCount)*100) : 0;
                                    return `<div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5">
                                        <div class="flex items-center gap-5 mb-8">
                                            <img src="${c.photo}" class="w-20 h-20 rounded-3xl object-cover ring-4 ring-slate-800">
                                            <div>
                                                <h3 class="font-black text-white uppercase tracking-tight text-sm">${c.name}</h3>
                                                <p class="text-2xl font-black text-indigo-500">${c.votes} <span class="text-[10px] text-slate-500 uppercase font-bold ml-1">Suara</span></p>
                                            </div>
                                        </div>
                                        <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden mb-2"><div class="h-full grad-primary transition-all duration-1000" style="width:${p}%"></div></div>
                                        <p class="text-[10px] font-black text-indigo-500 text-right uppercase tracking-widest">${p}%</p>
                                    </div>`;
                                }).join('')}
                            </div>
                        ` : ''}

                        ${adminTab === 'settings' ? `
                            <div class="max-w-xl mx-auto space-y-6">
                                <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5">
                                    <div class="flex items-center justify-between mb-6">
                                        <div class="flex items-center gap-3">
                                            <div class="w-10 h-10 bg-indigo-500/10 text-indigo-500 rounded-xl flex items-center justify-center"><i data-lucide="bell"></i></div>
                                            <h3 class="text-[10px] font-black text-white uppercase tracking-widest">Discord Notif</h3>
                                        </div>
                                        <label class="switch">
                                            <input type="checkbox" id="discord-toggle" ${discordEnabled ? 'checked' : ''}>
                                            <span class="slider"></span>
                                        </label>
                                    </div>
                                    <input id="discord-url" type="text" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-[10px] font-bold outline-none mb-2" value="${discordWebhook}" placeholder="Discord Webhook URL">
                                </div>

                                <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5">
                                    <div class="flex items-center justify-between mb-6">
                                        <div class="flex items-center gap-3">
                                            <div class="w-10 h-10 bg-emerald-500/10 text-emerald-500 rounded-xl flex items-center justify-center"><i data-lucide="message-square"></i></div>
                                            <h3 class="text-[10px] font-black text-white uppercase tracking-widest">WA Notif (Fonnte)</h3>
                                        </div>
                                        <label class="switch">
                                            <input type="checkbox" id="wa-toggle" ${whatsappConfig.enabled ? 'checked' : ''}>
                                            <span class="slider"></span>
                                        </label>
                                    </div>
                                    <div class="space-y-3 mb-6">
                                        <input id="wa-token" type="text" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-[10px] font-bold outline-none" value="${whatsappConfig.token}" placeholder="API Token Fonnte">
                                        <input id="wa-target" type="text" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-[10px] font-bold outline-none" value="${whatsappConfig.target}" placeholder="Nomor WA (Target)">
                                    </div>
                                    <button onclick="window.updateNotifications()" class="w-full py-5 grad-whatsapp text-white font-black rounded-2xl text-[10px] uppercase tracking-widest shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">Simpan Konfigurasi</button>
                                </div>
                            </div>
                        ` : ''}

                        ${adminTab === 'candidates' ? `
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5 h-fit">
                                    <h3 class="text-xs font-black text-indigo-500 uppercase mb-6 tracking-widest">Tambah Kandidat</h3>
                                    <div class="space-y-4">
                                        <input id="c-name" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-[10px] font-bold outline-none" placeholder="Nama Paslon">
                                        <input id="c-photo" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-[10px] font-bold outline-none" placeholder="URL Foto">
                                        <textarea id="c-vision" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-[10px] font-bold outline-none h-24" placeholder="Visi & Misi"></textarea>
                                        <button onclick="window.addCandidate()" class="w-full py-4 grad-primary text-white font-black rounded-2xl text-[10px] uppercase tracking-widest active:scale-95 transition-all">Simpan Paslon</button>
                                    </div>
                                </div>
                                <div class="space-y-4">
                                    ${candidates.map(c => `
                                        <div class="bg-slate-900 p-6 rounded-[2rem] border border-white/5 flex items-center justify-between">
                                            <div class="flex items-center gap-4">
                                                <img src="${c.photo}" class="w-12 h-12 rounded-xl object-cover ring-2 ring-slate-800">
                                                <p class="font-black text-[10px] uppercase text-white">${c.name}</p>
                                            </div>
                                            <button onclick="window.showModal('HAPUS', 'Hapus kandidat ${c.name}?', () => window.deleteCandidate('${c.id}'))" class="w-10 h-10 bg-red-500/10 text-red-500 rounded-xl flex items-center justify-center active:scale-90"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${adminTab === 'voters' ? `
                             <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5 h-fit">
                                    <h3 class="text-xs font-black text-indigo-500 uppercase mb-6 tracking-widest">Registrasi Siswa</h3>
                                    <div class="space-y-4">
                                        <input id="v-name" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-[10px] font-bold outline-none" placeholder="Nama Lengkap">
                                        <div class="grid grid-cols-2 gap-3">
                                            <input id="v-nisn" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-[10px] font-bold outline-none" placeholder="NISN">
                                            <input id="v-class" class="w-full p-4 bg-slate-800 text-white rounded-2xl text-[10px] font-bold outline-none" placeholder="Kelas">
                                        </div>
                                        <input id="v-pass" type="text" class="hide-password w-full p-4 bg-slate-800 text-white rounded-2xl text-[10px] font-bold outline-none" placeholder="Password">
                                        <button onclick="window.addVoter()" class="w-full py-4 bg-white text-slate-900 font-black rounded-2xl text-[10px] uppercase tracking-widest active:scale-95 transition-all">Daftarkan</button>
                                    </div>
                                </div>
                                <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5">
                                    <h3 class="text-[10px] font-black text-slate-500 uppercase mb-6 tracking-widest">Daftar Pemilih (${voters.length})</h3>
                                    <div class="space-y-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                        ${voters.map(v => `
                                            <div class="p-4 rounded-2xl bg-slate-800/40 border border-white/5 flex justify-between items-center">
                                                <div>
                                                    <p class="text-[10px] font-black text-white uppercase">${v.name}</p>
                                                    <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">${v.nisn} • ${v.class} ${v.hasVoted ? '• <span class="text-emerald-500">VOTED</span>' : ''}</p>
                                                </div>
                                                <button onclick="window.showModal('HAPUS', 'Hapus ${v.name}?', () => window.deleteVoter('${v.nisn}'))" class="w-8 h-8 flex items-center justify-center text-slate-600 hover:text-red-500 active:scale-90"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>`;
            }

            root.innerHTML = statusHtml + modalHtml + sidebarHtml + content;
            lucide.createIcons();
        };

        window.onload = startApp;
    </script>
</head>
<body>
    <div id="app-root"></div>
</body>
</html>
