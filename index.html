<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting OSIS v3 - Full Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFD_ZOL4RAyaadaGdk5PJb8BIwG6GInOE",
            authDomain: "testsaja-39ab7.firebaseapp.com",
            projectId: "testsaja-39ab7",
            storageBucket: "testsaja-39ab7.firebasestorage.app",
            messagingSenderId: "503650943182",
            appId: "1:503650943182:web:eec5678291f3bf2774509f",
            measurementId: "G-VSQ3SHGHQL"
        };

        let db, auth, appId;
        let currentUser = null;
        let currentRole = null; 
        let currentView = 'selection'; 
        let candidates = [];
        let voters = [];
        let webhookUrl = "";
        let isConnected = false;

        const appRoot = document.getElementById('app-root');

        async function startApp() {
            try {
                appId = typeof __app_id !== 'undefined' ? __app_id : 'osis-evoting-v3-final';
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { await signInAnonymously(auth); }
                };
                
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) startDataListeners();
                    window.render();
                });

            } catch (err) {
                appRoot.innerHTML = `<div class="p-10 text-center text-red-500 font-bold">${err.message}</div>`;
            }
        }

        function startDataListeners() {
            const basePath = ['artifacts', appId, 'public', 'data'];

            onSnapshot(collection(db, ...basePath, 'candidates'), (snap) => {
                candidates = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                isConnected = true;
                if (!['voter-login', 'admin-login'].includes(currentView)) window.render();
            }, () => { isConnected = false; if (!['voter-login', 'admin-login'].includes(currentView)) window.render(); });

            onSnapshot(collection(db, ...basePath, 'voters'), (snap) => {
                voters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (!['voter-login', 'admin-login'].includes(currentView)) window.render();
            });

            onSnapshot(doc(db, ...basePath, 'settings', 'discord'), (docSnap) => {
                if (docSnap.exists()) webhookUrl = docSnap.data().url || "";
                if (!['voter-login', 'admin-login'].includes(currentView)) window.render();
            });
        }

        // --- ACTIONS ---
        window.setCurrentView = (view) => { currentView = view; window.render(); };
        window.logout = () => { currentRole = null; currentUser = null; currentView = 'selection'; window.render(); };

        window.handleLogin = async (type) => {
            const userInp = document.getElementById('login-user').value.trim();
            const passInp = document.getElementById('login-pass').value.trim();
            const errorEl = document.getElementById('login-error');

            if (type === 'admin') {
                if (userInp === 'admin' && passInp === 'adminosis2024') {
                    currentRole = 'admin';
                    currentView = 'admin-panel';
                } else { errorEl.innerText = "Kredensial Admin Salah!"; return; }
            } else {
                const found = voters.find(v => v.nisn === userInp && v.password === passInp);
                if (found) {
                    currentRole = 'voter';
                    currentUser = { ...found };
                    currentView = 'voter-panel';
                } else { errorEl.innerText = "NISN atau Password Salah!"; return; }
            }
            window.render();
        };

        window.saveWebhook = async () => {
            const url = document.getElementById('discord-url').value.trim();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'discord'), { url });
            alert("Webhook Discord Berhasil Disimpan!");
        };

        window.addCandidate = async () => {
            const name = document.getElementById('cand-name').value;
            const photo = document.getElementById('cand-photo').value || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}`;
            const vision = document.getElementById('cand-vision').value;
            if (!name) return;
            const candRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'candidates'));
            await setDoc(candRef, { name, photo, vision, votes: 0 });
            alert("Kandidat berhasil ditambahkan!");
            window.render();
        };

        window.addVoter = async () => {
            const name = document.getElementById('v-name').value;
            const nisn = document.getElementById('v-nisn').value;
            const cls = document.getElementById('v-class').value;
            const pass = document.getElementById('v-pass').value;
            if (!nisn || !name || !pass) { alert("Lengkapi data siswa!"); return; }
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', nisn), { 
                name, nisn, class: cls, password: pass, hasVoted: false 
            });
            alert("Siswa berhasil didaftarkan!");
            window.render();
        };

        window.castVote = async (candId) => {
            if (!currentUser || currentUser.hasVoted) return;
            const cand = candidates.find(c => c.id === candId);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', candId), { votes: (cand.votes || 0) + 1 });
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', currentUser.nisn), { hasVoted: true });
            
            if (webhookUrl) {
                fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: `🗳️ **VOTE MASUK!**\nPemilih: **${currentUser.name}** (${currentUser.class})\nMemilih: **${cand.name}**` })
                }).catch(() => {});
            }
            currentUser.hasVoted = true;
            window.render();
        };

        window.deleteCandidate = async (id) => { if(confirm("Hapus kandidat ini?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', id)); };
        window.deleteVoter = async (nisn) => { if(confirm("Hapus siswa ini?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', nisn)); };

        // --- RENDERER ---
        window.render = function() {
            let html = "";
            const connStatus = `
                <div class="fixed top-0 left-0 right-0 z-[100] flex items-center justify-center py-1 px-4 ${isConnected ? 'bg-emerald-500' : 'bg-red-500'} transition-colors">
                    <div class="text-white font-black text-[9px] uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="${isConnected ? 'wifi' : 'wifi-off'}" class="w-3 h-3"></i>
                        ${isConnected ? 'DATABASE CLOUD TERKONEKSI' : 'DATABASE OFFLINE - MENCOBA LAGI...'}
                    </div>
                </div>`;

            if (currentView === 'selection') {
                html = `
                <div class="flex min-h-screen items-center justify-center bg-slate-100 p-6">
                    <div class="w-full max-w-sm space-y-4">
                        <div class="text-center mb-10">
                            <h1 class="text-4xl font-black text-slate-800 tracking-tighter italic">E-VOTING OSIS</h1>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Masa Bakti 2024/2025</p>
                        </div>
                        <button onclick="window.setCurrentView('voter-login')" class="w-full bg-white p-6 rounded-3xl shadow-lg flex items-center gap-4 hover:bg-slate-50 active:scale-95 transition-all border border-white">
                            <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center"><i data-lucide="user"></i></div>
                            <span class="font-black text-slate-700 uppercase text-sm">Masuk Sebagai Siswa</span>
                        </button>
                        <button onclick="window.setCurrentView('admin-login')" class="w-full bg-slate-800 p-6 rounded-3xl shadow-lg flex items-center gap-4 hover:bg-slate-900 active:scale-95 transition-all text-white">
                            <div class="w-12 h-12 bg-slate-700 text-indigo-400 rounded-2xl flex items-center justify-center"><i data-lucide="shield-check"></i></div>
                            <span class="font-black uppercase text-sm">Panel Administrasi</span>
                        </button>
                    </div>
                </div>`;
            } else if (currentView === 'voter-login' || currentView === 'admin-login') {
                const isAdmin = currentView === 'admin-login';
                html = `
                <div class="flex min-h-screen items-center justify-center bg-slate-100 p-6">
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-md border border-white">
                        <button onclick="window.setCurrentView('selection')" class="mb-6 text-[9px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 hover:text-indigo-600 transition-colors"><i data-lucide="arrow-left" class="w-3 h-3"></i> Kembali</button>
                        <h2 class="text-2xl font-black text-slate-800 mb-6 uppercase tracking-tight">Login ${isAdmin ? 'Admin' : 'Pemilih'}</h2>
                        <div class="space-y-3">
                            <input id="login-user" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-indigo-500 font-bold text-sm" placeholder="${isAdmin ? 'Username' : 'Masukkan NISN'}">
                            <input id="login-pass" type="password" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-indigo-500 font-bold text-sm" placeholder="Masukkan Password">
                            <p id="login-error" class="text-red-500 text-[9px] font-bold uppercase text-center min-h-[1rem]"></p>
                            <button onclick="window.handleLogin('${isAdmin ? 'admin' : 'voter'}')" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest">Masuk Ke Sistem</button>
                        </div>
                    </div>
                </div>`;
            } else if (currentView === 'admin-panel') {
                const totalVoters = voters.length;
                const votedCount = voters.filter(v => v.hasVoted).length;
                const notVoted = voters.filter(v => !v.hasVoted);
                const alreadyVoted = voters.filter(v => v.hasVoted);

                html = `
                <div class="min-h-screen bg-slate-100 p-4 pt-12 md:p-12 md:pt-16">
                    ${connStatus}
                    <div class="max-w-6xl mx-auto space-y-8">
                        <!-- Header -->
                        <div class="flex justify-between items-center bg-white p-6 rounded-[2rem] shadow-sm">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center"><i data-lucide="settings"></i></div>
                                <h2 class="font-black text-slate-800 uppercase tracking-tighter text-xl">Dashboard <span class="text-indigo-600">Admin</span></h2>
                            </div>
                            <button onclick="window.logout()" class="px-6 py-2 bg-red-50 text-red-500 font-black rounded-xl text-[10px] uppercase tracking-widest border border-red-100">Keluar</button>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <!-- Sidebar Admin -->
                            <div class="space-y-6">
                                <div class="bg-indigo-900 p-6 rounded-[2rem] text-white shadow-lg">
                                    <h3 class="text-[10px] font-black uppercase tracking-widest mb-4 opacity-60">Webhook Discord</h3>
                                    <input id="discord-url" value="${webhookUrl}" class="w-full p-3 bg-white/10 rounded-xl mb-3 text-[10px] outline-none border border-white/5 focus:border-white/20" placeholder="https://discord.com/api/webhooks/...">
                                    <button onclick="window.saveWebhook()" class="w-full py-3 bg-white text-indigo-900 font-black rounded-xl text-[10px] uppercase tracking-widest hover:bg-slate-100 transition-colors">Simpan Webhook</button>
                                </div>

                                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                                    <h3 class="text-[10px] font-black uppercase tracking-widest mb-4 text-slate-400">Pendaftaran Siswa Baru</h3>
                                    <div class="space-y-3">
                                        <input id="v-name" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="Nama Lengkap">
                                        <div class="grid grid-cols-2 gap-2">
                                            <input id="v-nisn" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="NISN (Username)">
                                            <input id="v-class" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="Kelas">
                                        </div>
                                        <input id="v-pass" type="password" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="Password Login">
                                        <button onclick="window.addVoter()" class="w-full py-3 bg-emerald-600 text-white font-black rounded-xl text-[10px] uppercase tracking-widest shadow-lg shadow-emerald-100">Daftarkan Siswa</button>
                                    </div>
                                </div>

                                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                                    <h3 class="text-[10px] font-black uppercase tracking-widest mb-4 text-slate-400">Tambah Paslon</h3>
                                    <div class="space-y-3">
                                        <input id="cand-name" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="Nama Paslon">
                                        <input id="cand-photo" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" placeholder="Link Foto (Opsional)">
                                        <textarea id="cand-vision" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold h-20" placeholder="Visi & Misi"></textarea>
                                        <button onclick="window.addCandidate()" class="w-full py-3 bg-indigo-600 text-white font-black rounded-xl text-[10px] uppercase tracking-widest shadow-lg shadow-indigo-100">Simpan Paslon</button>
                                    </div>
                                </div>
                            </div>

                            <!-- Main Content Admin -->
                            <div class="lg:col-span-2 space-y-6">
                                <!-- Stats Perolehan -->
                                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-white">
                                    <div class="flex justify-between items-center mb-6">
                                        <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Real-time Count</h3>
                                        <span class="bg-indigo-50 text-indigo-600 text-[10px] font-black px-4 py-1 rounded-full border border-indigo-100">${votedCount} / ${totalVoters} Masuk</span>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        ${candidates.length === 0 ? '<p class="text-slate-300 italic text-xs p-4">Kandidat kosong.</p>' : candidates.map(c => {
                                            const p = votedCount > 0 ? Math.round((c.votes/votedCount)*100) : 0;
                                            return `
                                            <div class="p-4 bg-slate-50 rounded-3xl border border-slate-100 group relative">
                                                <button onclick="window.deleteCandidate('${c.id}')" class="absolute top-2 right-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="x-circle" class="w-4 h-4"></i></button>
                                                <div class="flex items-center gap-3 mb-3">
                                                    <img src="${c.photo}" class="w-10 h-10 rounded-xl object-cover bg-white shadow-sm" onerror="this.src='https://ui-avatars.com/api/?name=P'">
                                                    <div>
                                                        <h4 class="font-black text-[11px] uppercase truncate w-32">${c.name}</h4>
                                                        <p class="text-[10px] font-black text-indigo-600">${c.votes} Suara (${p}%)</p>
                                                    </div>
                                                </div>
                                                <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden"><div class="h-full bg-indigo-500 transition-all duration-1000" style="width:${p}%"></div></div>
                                            </div>`;
                                        }).join('')}
                                    </div>
                                </div>

                                <!-- Manajemen Siswa -->
                                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-white">
                                    <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6">Manajemen Pemilih</h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div>
                                            <h4 class="text-[9px] font-black text-red-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i data-lucide="circle" class="w-2 h-2 fill-current"></i> Belum Memilih (${notVoted.length})</h4>
                                            <div class="max-h-60 overflow-y-auto space-y-2 pr-2">
                                                ${notVoted.map(v => `
                                                    <div class="p-3 bg-slate-50 rounded-xl flex justify-between items-center group border border-transparent hover:border-slate-200 transition-colors">
                                                        <div>
                                                            <p class="text-[10px] font-black uppercase">${v.name}</p>
                                                            <p class="text-[8px] font-bold text-slate-400 italic">${v.nisn} - ${v.class}</p>
                                                        </div>
                                                        <button onclick="window.deleteVoter('${v.nisn}')" class="text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                        <div>
                                            <h4 class="text-[9px] font-black text-emerald-500 uppercase tracking-widest mb-3 flex items-center gap-2"><i data-lucide="check-circle-2" class="w-2 h-2 fill-current"></i> Sudah Memilih (${alreadyVoted.length})</h4>
                                            <div class="max-h-60 overflow-y-auto space-y-2 pr-2">
                                                ${alreadyVoted.map(v => `
                                                    <div class="p-3 bg-emerald-50/50 rounded-xl flex justify-between items-center group border border-emerald-100">
                                                        <div>
                                                            <p class="text-[10px] font-black uppercase text-slate-700">${v.name}</p>
                                                            <p class="text-[8px] font-bold text-emerald-600/70 italic">${v.nisn} - ${v.class}</p>
                                                        </div>
                                                        <button onclick="window.deleteVoter('${v.nisn}')" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            } else if (currentView === 'voter-panel') {
                html = `
                <div class="min-h-screen bg-slate-100 p-6 pt-12 text-center">
                    ${connStatus}
                    <div class="max-w-xl mx-auto bg-white p-8 md:p-12 rounded-[3.5rem] shadow-2xl border border-white">
                        <div class="mb-10">
                            <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">${currentUser.name}</h2>
                            <p class="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mt-1">${currentUser.class} • ${currentUser.nisn}</p>
                        </div>
                        ${currentUser.hasVoted ? `
                            <div class="py-12 bg-slate-50 rounded-[3rem] border border-slate-100">
                                <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="check" class="w-8 h-8"></i></div>
                                <h3 class="font-black text-slate-800 text-xl uppercase tracking-tight">SUARA ANDA TERKIRIM</h3>
                                <p class="text-xs text-slate-400 mt-2 font-medium italic">Data berhasil dienkripsi dan disimpan di cloud.</p>
                                <button onclick="window.logout()" class="mt-8 px-10 py-3 bg-slate-900 text-white font-black rounded-full text-[10px] uppercase tracking-widest hover:scale-105 transition-transform">Keluar Sistem</button>
                            </div>
                        ` : `
                            <div class="space-y-4 text-left">
                                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center">Silakan pilih satu kandidat di bawah ini:</p>
                                ${candidates.map((c, idx) => `
                                    <div class="p-5 bg-slate-50 rounded-[2.5rem] border border-slate-100 flex items-center gap-5 hover:bg-white hover:shadow-xl transition-all group">
                                        <div class="relative">
                                            <img src="${c.photo}" class="w-20 h-20 rounded-3xl object-cover bg-white shadow-sm" onerror="this.src='https://ui-avatars.com/api/?name=${idx+1}'">
                                            <span class="absolute -top-2 -left-2 w-7 h-7 bg-indigo-600 text-white rounded-lg flex items-center justify-center font-black text-xs shadow-lg">${idx+1}</span>
                                        </div>
                                        <div class="flex-1">
                                            <h4 class="font-black text-sm uppercase tracking-tight text-slate-700">${c.name}</h4>
                                            <p class="text-[9px] text-slate-400 font-bold italic line-clamp-1 mb-3">${c.vision || 'Visi & misi tidak dicantumkan.'}</p>
                                            <button onclick="window.castVote('${c.id}')" class="px-6 py-2 bg-indigo-600 text-white font-black rounded-full text-[9px] uppercase shadow-lg shadow-indigo-100 group-hover:bg-slate-900 transition-colors">Gunakan Suara</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                </div>`;
            }
            appRoot.innerHTML = html;
            lucide.createIcons();
        };

        window.onload = startApp;
    </script>
</head>
<body class="bg-slate-100 font-sans selection:bg-indigo-100 overflow-x-hidden antialiased">
    <div id="app-root">
        <div class="flex h-screen items-center justify-center bg-white p-10 text-center">
            <div class="space-y-4">
                <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
                <p class="font-black text-slate-800 text-[10px] uppercase tracking-widest animate-pulse">Menyinkronkan Database...</p>
            </div>
        </div>
    </div>
</body>
</html>
