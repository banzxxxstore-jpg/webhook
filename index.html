<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-VOTE OSIS | Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .btn-gradient { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
        .voter-item:hover { transform: translateY(-2px); transition: all 0.2s; }
        
        /* Loading Spinner */
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e2e8f0;
            border-top: 4px solid #6366f1; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-screen {
            position: fixed; inset: 0; background: white; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="antialiased text-slate-900">

    <!-- Screen: Loading -->
    <div id="loading-screen" class="loading-screen">
        <div class="spinner mb-4"></div>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Menghubungkan ke Database...</p>
    </div>

    <!-- Screen: Selection (Landing) -->
    <div id="view-selection" class="min-h-screen flex flex-col items-center justify-center p-6 space-y-8">
        <div class="text-center">
            <div class="inline-flex p-4 bg-white rounded-3xl shadow-xl mb-6">
                <svg class="w-12 h-12 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">OSIS<span class="text-indigo-600">.</span></h1>
            <p class="text-slate-500 font-medium mt-1 uppercase text-[10px] tracking-[0.2em]">Digital Voting System</p>
        </div>

        <div class="w-full max-w-sm space-y-4">
            <button onclick="showLogin('voter')" class="w-full glass p-5 rounded-[2rem] border border-white card-shadow flex items-center gap-4 active:scale-95 transition-all">
                <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-xl font-bold">👤</div>
                <div class="text-left">
                    <span class="block font-bold text-slate-800">Login Siswa</span>
                    <span class="text-[10px] text-slate-400 font-bold uppercase">Berikan Suara Anda</span>
                </div>
            </button>

            <button onclick="showLogin('admin')" class="w-full bg-slate-900 p-5 rounded-[2rem] border border-slate-800 card-shadow flex items-center gap-4 active:scale-95 transition-all">
                <div class="w-12 h-12 bg-slate-800 text-indigo-400 rounded-2xl flex items-center justify-center text-xl font-bold">⚙️</div>
                <div class="text-left">
                    <span class="block font-bold text-white">Login Admin</span>
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Kelola Database</span>
                </div>
            </button>
        </div>
    </div>

    <!-- Screen: Login Card -->
    <div id="view-login" class="hidden min-h-screen flex items-center justify-center p-6">
        <div id="login-card" class="w-full max-w-sm p-8 rounded-[2.5rem] card-shadow border relative overflow-hidden">
            <button onclick="hideLogin()" class="mb-8 text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                <span>← Kembali</span>
            </button>
            <h2 class="text-2xl font-extrabold mb-8 tracking-tight" id="login-label">Portal Akses</h2>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <input id="login-user" type="text" placeholder="Username / NISN" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-semibold text-sm border-none">
                </div>
                <div class="space-y-1">
                    <input id="login-pass" type="password" placeholder="Password" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-semibold text-sm border-none">
                </div>
                
                <div id="login-err" class="hidden bg-red-50 text-red-500 text-[11px] font-bold p-4 rounded-2xl border border-red-100"></div>
                
                <button id="btn-submit-login" class="w-full py-4 btn-gradient text-white rounded-2xl font-extrabold text-xs uppercase tracking-widest shadow-lg shadow-indigo-200 active:scale-95 transition-all mt-4">
                    Konfirmasi Masuk
                </button>
            </div>
        </div>
    </div>

    <!-- Screen: Voter Dashboard -->
    <div id="view-voter" class="hidden max-w-md mx-auto p-6 space-y-6">
        <div class="bg-white p-5 rounded-[2rem] card-shadow flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-sm">S</div>
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Selamat Datang</p>
                    <h3 id="user-name" class="font-bold text-slate-800">-</h3>
                </div>
            </div>
            <button onclick="location.reload()" class="p-3 bg-red-50 text-red-500 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
        </div>

        <div id="voter-candidates" class="space-y-6 pt-4"></div>
    </div>

    <!-- Screen: Admin Dashboard -->
    <div id="view-admin" class="hidden max-w-6xl mx-auto p-6">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Admin<span class="text-indigo-600">.</span></h1>
                <p class="text-slate-400 text-xs font-semibold">Dashboard Manajemen Pemilihan</p>
            </div>
            <div class="flex gap-2">
                <button onclick="location.reload()" class="px-5 py-3 bg-white text-slate-600 rounded-2xl text-[11px] font-bold uppercase tracking-widest border border-slate-200 shadow-sm active:scale-95">Log Out</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            <!-- Sidebar: Config & Stats -->
            <div class="lg:col-span-4 space-y-8">
                <!-- Webhook Card -->
                <div class="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl shadow-indigo-100">
                    <h3 class="text-sm font-bold uppercase tracking-[0.2em] opacity-80 mb-6">Discord Webhook</h3>
                    <input id="admin-webhook" type="text" placeholder="https://discord.com/api/webhooks/..." class="w-full bg-white/10 border border-white/20 rounded-2xl p-4 text-xs font-bold text-white placeholder-white/40 mb-4 focus:ring-2 focus:ring-white outline-none">
                    <button id="save-webhook" class="w-full bg-white text-indigo-600 py-4 rounded-2xl font-bold text-[11px] uppercase tracking-widest hover:bg-slate-50 transition-all active:scale-95">Update Endpoint</button>
                </div>

                <!-- Stats Card -->
                <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-white">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Hasil Perolehan</h3>
                    <div id="admin-stats" class="space-y-6"></div>
                </div>
            </div>

            <!-- Content: Candidate & Voter Management -->
            <div class="lg:col-span-8 space-y-8">
                <div class="grid md:grid-cols-2 gap-8">
                    <!-- Manage Candidates -->
                    <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-white">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Tambah Paslon</h3>
                        <div class="space-y-4">
                            <input id="c-name" placeholder="Nama Lengkap Paslon" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500">
                            <input id="c-img" placeholder="URL Foto (Opsional)" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500">
                            <textarea id="c-vision" placeholder="Visi & Misi Ringkas" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500 h-24"></textarea>
                            <button id="add-candidate" class="w-full btn-gradient text-white py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest shadow-lg shadow-indigo-100">Simpan Kandidat</button>
                        </div>
                    </div>

                    <!-- Manage Voters -->
                    <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-white">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Daftar Pemilih</h3>
                        <div class="space-y-4 mb-8">
                            <input id="v-name" placeholder="Nama Siswa" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500">
                            <div class="flex gap-2">
                                <input id="v-nisn" placeholder="NISN" class="w-1/2 p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500">
                                <input id="v-pass" placeholder="Pass" class="w-1/2 p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <button id="add-voter" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest">Tambah Pemilih</button>
                        </div>
                        <div id="voter-list" class="space-y-2 max-h-64 overflow-y-auto pr-2 custom-scroll"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, runTransaction, deleteDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // Konfigurasi Database (Gunakan milik Anda)
        const firebaseConfig = {
            apiKey: "AIzaSyDFD_ZOL4RAyaadaGdk5PJb8BIwG6GInOE",
            authDomain: "testsaja-39ab7.firebaseapp.com",
            projectId: "testsaja-39ab7",
            storageBucket: "testsaja-39ab7.firebasestorage.app",
            messagingSenderId: "503650943182",
            appId: "1:503650943182:web:eec5678291f3bf2774509f"
        };

        const appId = "premium-evote-2024";
        let db, auth, currentUser = null;
        let candidates = [], voters = [], webhookUrl = "";

        // Initialization
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            onAuthStateChanged(auth, (user) => {
                if(user) {
                    initRealtime();
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
                }
            });
            signInAnonymously(auth);
        } catch(e) { console.error(e); }

        function initRealtime() {
            // Webhook Settings
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), (s) => {
                if(s.exists()) {
                    webhookUrl = s.data().webhook || "";
                    document.getElementById('admin-webhook').value = webhookUrl;
                }
            });

            // Candidates
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'candidates'), (s) => {
                candidates = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderStats();
                if(currentUser) renderVoterUI();
            });

            // Voters
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'voters'), (s) => {
                voters = s.docs.map(d => ({id: d.id, ...d.data()}));
                if(currentUser) {
                    const me = voters.find(v => v.nisn === currentUser.nisn);
                    if(me) { currentUser = me; renderVoterUI(); }
                }
                renderVoterList();
            });
        }

        /** LOGIC: DISCORD NOTIFICATION **/
        async function pushDiscord(msg, color = 3447003) {
            if(!webhookUrl) return;
            const payload = {
                embeds: [{
                    title: "OSIS EVOTE SYSTEM",
                    description: msg,
                    color: color,
                    timestamp: new Date().toISOString()
                }]
            };
            fetch(webhookUrl, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        }

        /** UI: LOGIN **/
        window.showLogin = (role) => {
            window.targetRole = role;
            document.getElementById('view-selection').classList.add('hidden');
            document.getElementById('view-login').classList.remove('hidden');
            const card = document.getElementById('login-card');
            if(role === 'admin') {
                card.classList.add('bg-slate-900', 'text-white', 'border-slate-800');
                card.classList.remove('bg-white', 'text-slate-900', 'border-white');
                document.getElementById('login-label').innerText = "Admin Console";
            } else {
                card.classList.add('bg-white', 'text-slate-900', 'border-white');
                card.classList.remove('bg-slate-900', 'text-white', 'border-slate-800');
                document.getElementById('login-label').innerText = "Portal Siswa";
            }
        };

        window.hideLogin = () => {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-selection').classList.remove('hidden');
            document.getElementById('login-err').classList.add('hidden');
        };

        document.getElementById('btn-submit-login').onclick = () => {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            const err = document.getElementById('login-err');
            err.classList.add('hidden');

            if(window.targetRole === 'admin') {
                if(u === 'admin' && p === 'adminosis2024') {
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                } else { err.innerText = "Kredensial Admin Salah!"; err.classList.remove('hidden'); }
            } else {
                const siswa = voters.find(v => v.nisn === u && v.password === p);
                if(siswa) {
                    currentUser = siswa;
                    document.getElementById('user-name').innerText = siswa.name;
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-voter').classList.remove('hidden');
                    renderVoterUI();
                } else { err.innerText = "NISN atau Password Salah!"; err.classList.remove('hidden'); }
            }
        };

        /** DASHBOARD: ADMIN **/
        document.getElementById('save-webhook').onclick = async () => {
            const val = document.getElementById('admin-webhook').value;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), { webhook: val });
            alert("Webhook disimpan!");
        };

        document.getElementById('add-candidate').onclick = async () => {
            const n = document.getElementById('c-name').value;
            const i = document.getElementById('c-img').value;
            const v = document.getElementById('c-vision').value;
            if(!n || !v) return;
            const img = i || `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=6366f1&color=fff&size=200`;
            await setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'candidates')), { name: n, vision: v, img, votes: 0 });
            document.getElementById('c-name').value = ""; document.getElementById('c-img').value = ""; document.getElementById('c-vision').value = "";
        };

        document.getElementById('add-voter').onclick = async () => {
            const n = document.getElementById('v-name').value;
            const ni = document.getElementById('v-nisn').value;
            const pa = document.getElementById('v-pass').value;
            if(!n || !ni || !pa) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', ni), { name: n, nisn: ni, password: pa, hasVoted: false, votedFor: null });
            document.getElementById('v-name').value = ""; document.getElementById('v-nisn').value = ""; document.getElementById('v-pass').value = "";
        };

        window.deleteCandidate = async (id) => {
            if(confirm("Hapus kandidat? Suara akan ikut terhapus.")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', id));
            }
        };

        /** LOGIC: HAPUS VOTER & SINKRON SUARA **/
        window.deleteVoter = async (nisn) => {
            const v = voters.find(x => x.nisn === nisn);
            if(!v) return;
            if(!confirm(`Hapus ${v.name}? Jika sudah memilih, suaranya akan dibatalkan otomatis.`)) return;

            try {
                // SINKRONISASI: Jika voter sudah memilih, kurangi perolehan kandidatnya
                if(v.hasVoted && v.votedFor) {
                    const cRef = doc(db, 'artifacts', appId, 'public', 'data', 'candidates', v.votedFor);
                    const cSnap = await getDoc(cRef);
                    if(cSnap.exists()){
                        const current = cSnap.data().votes || 0;
                        await updateDoc(cRef, { votes: Math.max(0, current - 1) });
                        pushDiscord(`⚠️ **Suara Dibatalkan:** Voter **${v.name}** dihapus dari sistem. Suara ditarik dari paslon **${cSnap.data().name}**.`, 16711680);
                    }
                }
                // Hapus data voter
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', nisn));
            } catch(e) { console.error(e); }
        };

        /** DASHBOARD: VOTER **/
        window.castVote = async (cid) => {
            if(!currentUser || currentUser.hasVoted) return;
            const cRef = doc(db, 'artifacts', appId, 'public', 'data', 'candidates', cid);
            const vRef = doc(db, 'artifacts', appId, 'public', 'data', 'voters', currentUser.nisn);
            const target = candidates.find(c => c.id === cid);

            try {
                await runTransaction(db, async (tx) => {
                    const cSnap = await tx.get(cRef);
                    tx.update(cRef, { votes: (cSnap.data().votes || 0) + 1 });
                    tx.update(vRef, { hasVoted: true, votedFor: cid });
                });
                pushDiscord(`✅ **Suara Masuk:** Voter **${currentUser.name}** memberikan suara kepada paslon **${target.name}**.`, 3066993);
            } catch(e) { alert("Terjadi kesalahan."); }
        };

        /** RENDER FUNCTIONS **/
        function renderStats() {
            const el = document.getElementById('admin-stats');
            if(!el) return;
            const total = candidates.reduce((a, b) => a + (b.votes || 0), 0);
            el.innerHTML = candidates.map(c => {
                const p = total > 0 ? Math.round((c.votes/total)*100) : 0;
                return `
                    <div class="space-y-2 relative group">
                        <button onclick="deleteCandidate('${c.id}')" class="absolute -top-1 right-0 text-[8px] font-black text-red-400 opacity-0 group-hover:opacity-100 uppercase tracking-tighter">Hapus Paslon</button>
                        <div class="flex justify-between items-center text-[10px] font-bold uppercase">
                            <span class="text-slate-700">${c.name}</span>
                            <span class="text-indigo-600">${c.votes} Suara (${p}%)</span>
                        </div>
                        <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-indigo-500 rounded-full transition-all duration-1000" style="width:${p}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderVoterList() {
            const el = document.getElementById('voter-list');
            if(!el) return;
            el.innerHTML = voters.map(v => `
                <div class="voter-item p-4 bg-slate-50 rounded-2xl flex items-center justify-between border border-slate-100">
                    <div>
                        <p class="text-[10px] font-bold text-slate-800 uppercase">${v.name}</p>
                        <p class="text-[9px] font-medium text-slate-400 tracking-wider">${v.nisn} • ${v.hasVoted ? '<span class="text-emerald-500 font-black">VOTED</span>' : 'BELUM'}</p>
                    </div>
                    <button onclick="deleteVoter('${v.nisn}')" class="w-8 h-8 flex items-center justify-center text-red-400 hover:bg-red-50 rounded-full">✕</button>
                </div>
            `).join('');
        }

        function renderVoterUI() {
            const el = document.getElementById('voter-candidates');
            if(!el) return;
            if(currentUser.hasVoted) {
                el.innerHTML = `
                    <div class="bg-indigo-600 p-10 rounded-[3rem] text-center text-white shadow-2xl">
                        <div class="text-6xl mb-6">✨</div>
                        <h2 class="text-2xl font-black mb-2 tracking-tight">Vote Berhasil!</h2>
                        <p class="text-indigo-100 text-xs font-medium">Partisipasi Anda sangat berharga bagi masa depan sekolah.</p>
                        <button onclick="location.reload()" class="mt-8 px-8 py-4 bg-white text-indigo-600 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 shadow-xl">Selesai & Keluar</button>
                    </div>
                `;
                return;
            }
            el.innerHTML = candidates.map((c, idx) => `
                <div class="bg-white rounded-[2.5rem] p-6 card-shadow border border-white flex flex-col items-center text-center">
                    <img src="${c.img}" class="w-32 h-32 rounded-[2rem] object-cover mb-6 border-4 border-slate-50 shadow-md">
                    <span class="px-3 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-black rounded-full mb-3">PASLON 0${idx+1}</span>
                    <h3 class="text-xl font-bold text-slate-900 mb-2">${c.name}</h3>
                    <p class="text-[11px] text-slate-400 font-medium italic mb-8 px-4 leading-relaxed">"${c.vision}"</p>
                    <button onclick="castVote('${c.id}')" class="w-full py-4 btn-gradient text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-indigo-100 active:scale-95 transition-all">Pilih Sekarang</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
